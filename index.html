<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>생산관리2부 자재지원 시스템</title>
<style>
  :root {
    --bg: #0f1117; --surface: #1a1d27; --surface2: #22263a; 
    --border: #2e3350; --accent: #4f8ef7; --text: #e8eaf0;
  }
  body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 20px; }
  .container { max-width: 1000px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  
  /* 레이아웃 대응 */
  @media (max-width: 768px) { .container { grid-template-columns: 1fr; } }
  
  .card { background: var(--surface); border: 1px solid var(--border); padding: 15px; border-radius: 8px; }
  h2 { font-size: 16px; margin-bottom: 15px; color: var(--accent); }
  
  textarea, input { width: 100%; background: var(--surface2); border: 1px solid var(--border); color: white; padding: 10px; margin: 5px 0; border-radius: 4px; box-sizing: border-box; }
  button { background: var(--accent); color: white; border: none; padding: 10px; cursor: pointer; border-radius: 4px; width: 100%; margin-top: 10px; }
  
  table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
  th, td { border: 1px solid var(--border); padding: 8px; text-align: left; }
</style>
</head>
<body>

<div class="container">
  <div>
    <div class="card">
      <h2>📥 메시지 붙여넣기 및 조회</h2>
      <textarea id="main-input" rows="8" placeholder="메시지 붙여넣기..."></textarea>
      <button onclick="processData()">조회하기</button>
    </div>
    
    <div class="card" style="margin-top:20px;">
      <h2>＋ 매핑 추가</h2>
      <input id="new-vendor" placeholder="업체명">
      <input id="new-part" placeholder="자재명">
      <input id="new-code" placeholder="코드">
      <button onclick="addMapping()">저장하기</button>
    </div>
  </div>

  <div class="card">
    <h2>📋 등록된 매핑 목록 (스프레드시트용)</h2>
    <button onclick="copyToClipboard()" style="background:var(--surface2);">전체 복사 (엑셀 붙여넣기)</button>
    <table id="mapping-table">
      <thead><tr><th>업체</th><th>자재</th><th>코드</th></tr></thead>
      <tbody id="mapping-body"></tbody>
    </table>
  </div>
</div>

<script>
  // 스프레드시트 붙여넣기를 위해 탭(Tab)으로 구분하여 복사하는 기능
  function copyToClipboard() {
    let table = document.getElementById("mapping-table");
    let range = document.createRange();
    range.selectNode(table);
    window.getSelection().removeAllRanges();
    window.getSelection().addRange(range);
    document.execCommand("copy");
    alert("복사되었습니다! 스프레드시트에 붙여넣으세요.");
  }

  // 간단한 매핑 추가 예시 로직
  function addMapping() {
    const vendor = document.getElementById("new-vendor").value;
    const part = document.getElementById("new-part").value;
    const code = document.getElementById("new-code").value;
    
    const body = document.getElementById("mapping-body");
    const row = body.insertRow();
    row.innerHTML = `<td>${vendor}</td><td>${part}</td><td>${code}</td>`;
  }
</script>

</body>
</html>
