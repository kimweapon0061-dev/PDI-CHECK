<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="자재지원">
<meta name="theme-color" content="#0f1117">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230f1117'/%3E%3Ctext y='.9em' font-size='80' x='10'%3E🏭%3C/text%3E%3C/svg%3E">
<link rel="manifest" href="data:application/json,%7B%22name%22%3A%22%EC%83%9D%EC%82%B0%EA%B4%80%EB%A6%AC2%EB%B6%80+%EC%9E%90%EC%9E%AC%EC%A7%80%EC%9B%90%22%2C%22short_name%22%3A%22%EC%9E%90%EC%9E%AC%EC%A7%80%EC%9B%90%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%230f1117%22%2C%22theme_color%22%3A%22%230f1117%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data%3Aimage%2Fsvg%2Bxml%2C%253Csvg+xmlns%3D%27http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%27+viewBox%3D%270+0+100+100%27%253E%253Crect+width%3D%27100%27+height%3D%27100%27+rx%3D%2722%27+fill%3D%27%25230f1117%27%252F%253E%253Ctext+y%3D%27.9em%27+font-size%3D%2780%27+x%3D%2710%27%253E%25F0%259F%258F%25AD%253C%252Ftext%253E%253C%252Fsvg%253E%22%2C%22sizes%22%3A%22512x512%22%2C%22type%22%3A%22image%2Fsvg%2Bxml%22%7D%5D%7D">
<title>생산관리2부 자재지원 자동화 시스템</title>
<style>
  :root {
    --bg-main: #0f1117; --bg-card: #161922; --border: #242936;
    --text-main: #f1f5f9; --text-muted: #64748b;
    --accent: #3b82f6; --accent-hover: #2563eb;
    --success: #10b981; --danger: #ef4444; --warning: #f59e0b;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
  body { background: var(--bg-main); color: var(--text-main); padding: 16px; padding-bottom: calc(20px + var(--safe-bottom)); min-h: 100vh; display: flex; flex-direction: column; gap: 16px; -webkit-tap-highlight-color: transparent; }
  
  header { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; }
  .title-area h1 { font-size: 18px; font-weight: 700; color: #fff; letter-spacing: -0.5px; }
  .title-area span { font-size: 11px; color: var(--text-muted); }
  .btn-install { background: #1e2230; border: 1px border var(--border); color: #fff; padding: 6px 12px; rounded-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 4px; border-radius: 20px; }

  .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 16px; display: flex; flex-direction: column; gap: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
  .card-title { font-size: 13px; font-weight: 600; color: var(--text-muted); display: flex; align-items: center; gap: 6px; }
  
  textarea { width: 100%; height: 110px; background: #090a0f; border: 1px solid var(--border); border-radius: 10px; padding: 12px; color: #fff; font-size: 14px; resize: none; outline: none; transition: border 0.2s; font-family: monospace; }
  textarea:focus { border-color: var(--accent); }
  
  .btn-group { display: flex; gap: 8px; justify-content: flex-end; }
  button { padding: 10px 16px; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: all 0.15s ease; display: inline-flex; align-items: center; gap: 6px; }
  .btn-secondary { background: #1e2230; color: var(--text-main); border: 1px solid var(--border); }
  .btn-secondary:active { background: #282e40; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:active { background: var(--accent-hover); }
  
  .split-grid { display: grid; grid-template-columns: 1fr; gap: 16px; }
  @media(min-width: 768px) { .split-grid { grid-template-columns: 2.2fr 2.8fr; } }
  
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .input-box { display: flex; flex-direction: column; gap: 4px; }
  .input-box label { font-size: 11px; color: var(--text-muted); font-weight: 500; }
  input { background: #090a0f; border: 1px solid var(--border); border-radius: 8px; padding: 10px; color: #fff; font-size: 13px; outline: none; transition: border 0.2s; }
  input:focus { border-color: var(--accent); }
  .btn-submit { background: #22c55e; color: #fff; margin-top: 4px; justify-content: center; }
  .btn-submit:active { background: #16a34a; }
  
  .search-wrapper { relative; }
  .search-input { width: 100%; padding-left: 32px; background: #090a0f; }
  .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 14px; color: var(--text-muted); }

  .table-scroll { max-height: 290px; overflow-y: auto; border: 1px solid var(--border); border-radius: 10px; background: #090a0f; }
  table { width: 100%; border-collapse: collapse; text-align: left; font-size: 13px; }
  th { background: #13161f; color: var(--text-muted); font-weight: 600; padding: 10px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; position: sticky; top: 0; z-index: 1; border-bottom: 1px solid var(--border); }
  td { padding: 10px; border-bottom: 1px solid #161922; color: #cbd5e1; }
  tr:last-child td { border-bottom: none; }
  .badge { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: 700; font-family: monospace; }
  .badge-car { background: rgba(245,158,11,0.15); color: #f59e0b; }
  .badge-code { background: rgba(59,130,246,0.15); color: #60a5fa; }
  .badge-danger { background: rgba(239,68,68,0.15); color: #fca5a5; }
  .badge-success { background: rgba(16,185,129,0.15); color: #34d399; }

  #result-box { display: none; }
  #result-box.visible { display: flex; animation: fadeIn 0.2s ease-out; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  .result-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 10px; background: #090a0f; border-radius: 8px; border-left: 3px solid var(--text-muted); font-size: 13px; }
  .result-item.matched { border-left-color: var(--success); }
  .result-item.unmatched { border-left-color: var(--danger); }
  .origin-txt { font-family: monospace; color: #94a3b8; max-width: 65%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-20px); opacity: 0; background: #1e293b; border: 1px solid var(--border); color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 13px; font-weight: 600; z-index: 1000; transition: all 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28); box-shadow: 0 10px 25px rgba(0,0,0,0.3); pointer-events: none; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); display: none; justify-content: center; align-items: center; z-index: 2000; padding: 20px; }
  .modal { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; width: 100%; max-width: 340px; padding: 20px; display: flex; flex-direction: column; gap: 14px; text-align: center; }
  .modal h2 { font-size: 16px; font-weight: 700; color: #fff; }
  .modal p { font-size: 13px; color: var(--text-muted); line-height: 1.5; text-align: left; background: #090a0f; padding: 12px; border-radius: 10px; border: 1px solid var(--border); }
  
  .fast-parse-box { background: #090a0f; border: 1px dashed var(--border); border-radius: 10px; padding: 10px; display: flex; flex-direction: column; gap: 6px; }
  .fast-parse-box span { font-size: 11px; color: var(--text-muted); font-weight: 500; }
  .fast-parse-row { display: flex; gap: 6px; }
  .fast-parse-row input { flex: 1; padding: 6px 8px; font-size: 12px; border-radius: 6px; }
  .btn-fast-add { background: var(--accent); color: #fff; padding: 6px 10px; font-size: 12px; border-radius: 6px; white-space: nowrap; }
</style>
</head>
<body>

<header>
  <div class="title-area">
    <h1>생산관리2부 자재지원</h1>
    <span>자동화 시스템 · made by 김재현</span>
  </div>
  <button class="btn-install" onclick="showInstallGuide()">📲 앱 설치</button>
</header>

<div class="card">
  <div class="card-title">💬 단톡방 메시지 붙여넣기</div>
  <textarea id="paste-input" placeholder="여기에 카톡 메시지를 전체 붙여넣으세요&#10;예)&#10;24일 수출PDI 자재 신청입니다&#10;-미불출 건&#10;JD 9F3011 CONSOLE UPR COVER Y80"></textarea>
  <div class="btn-group">
    <button class="btn-secondary" onclick="clearAll()">초기화</button>
    <button class="btn-primary" onclick="processData()">🚀 조회 및 매핑</button>
  </div>
</div>

<div class="card" id="result-box">
  <div class="card-title">📊 분석 및 코드 치환 결과</div>
  <div id="result-list" style="display:flex; flex-direction:column; gap:6px; max-height:220px; overflow-y:auto;"></div>
  <div class="btn-group" style="margin-top:4px;">
    <button class="btn-primary" style="background:#0284c7; width:100%; justify-content:center;" onclick="copyResultText()">📋 결과 메시지 전체 복사</button>
  </div>
</div>

<div class="split-grid">
  <div class="card">
    <div class="card-title">➕ 새 매핑 데이터 추가</div>
    
    <div class="fast-parse-box">
      <span>💡 세로형 문자열 한 줄 자동 배분 (Enter 시 분할)</span>
      <div class="fast-parse-row">
        <input type="text" id="fast-input" placeholder="정명 [Enter] HK [Enter] 명칭 [Enter] 코드" onkeydown="if(event.key==='Enter') doFastParse()">
        <button class="btn-fast-add" onclick="doFastParse()">배분</button>
      </div>
    </div>
    
    <form id="mapping-form" onsubmit="submitMapping(event)" class="space-y-4" style="display:flex; flex-direction:column; gap:10px;">
      <div class="form-row">
        <div class="input-box">
          <label>업체명 *</label>
          <input type="text" id="form-com" required placeholder="예: 신기">
        </div>
        <div class="input-box">
          <label>차종 *</label>
          <input type="text" id="form-car" required placeholder="예: JR">
        </div>
      </div>
      <div class="input-box">
        <label>자재명 (매핑 키워드) *</label>
        <input type="text" id="form-name" required placeholder="예: CONSOLE UPR COVER">
      </div>
      <div class="input-box">
        <label>자재 코드 *</label>
        <input type="text" id="form-code" required placeholder="예: Y80">
      </div>
      <button type="submit" class="btn-submit">💾 구글 시트에 매핑 저장</button>
    </form>
  </div>

  <div class="card">
    <div class="card-title" style="justify-content:space-between;">
      <span>🗂️ 등록된 자재 매핑 DB (<span id="db-count">0</span>)</span>
      <button class="btn-secondary" style="padding:4px 8px; font-size:11px; border-radius:6px;" onclick="loadDatabase()">🔄 동기화</button>
    </div>
    <div class="search-wrapper">
      <span class="search-icon">🔍</span>
      <input type="text" id="search-input" class="search-input" placeholder="업체, 차종, 자재명, 코드로 실시간 검색..." oninput="searchDB()">
    </div>
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th>업체</th>
            <th>차종</th>
            <th>자재명 키워드</th>
            <th>코드</th>
          </tr>
        </thead>
        <tbody id="db-table-body">
          <tr><td colspan="4" style="text-align:center; color:var(--text-muted); padding:30px;">구글 시트 연동 중...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<div class="modal-overlay" id="install-modal">
  <div class="modal">
    <h2>📱 홈 화면에 앱으로 설치하기</h2>
    <p>
      <strong>[아이폰 / Safari]</strong><br>하단 공유버튼(⎋) 클릭 → <strong>'홈 화면에 추가'</strong> 선택<br><br>
      <strong>[안드로이드 / 크롬]</strong><br>우측 상단 메뉴(⋮) 클릭 → <strong>'앱 설치'</strong> 또는 <strong>'홈 화면에 추가'</strong> 선택
    </p>
    <button class="btn-primary" style="justify-content:center;" onclick="document.getElementById('install-modal').style.display='none'">확인</button>
  </div>
</div>

<div class="toast" id="toast">알림</div>

<script>
// 📌 질문자님의 구글 Apps Script 주소 적용 완료!
const API_URL = "https://script.google.com/macros/s/AKfycbyYWsfjhtnwltC19dtxhl-ww0wYuHObZLMytmqn7k5SC2Dc6btrpO5E1QEDWS76Udh5/exec";

let dbData = [];

window.addEventListener('DOMContentLoaded', () => {
  loadDatabase();
});

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}

// 1. 구글 시트에서 DB 로드 및 갱신
async function loadDatabase() {
  const tbody = document.getElementById("db-table-body");
  tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:var(--text-muted); padding:30px;">🔄 구글 시트 동기화 중...</td></tr>`;
  
  try {
    const res = await fetch(API_URL);
    const data = await res.json();
    
    // 첫행(헤더) 제외
    dbData = data.slice(1).map(r => ({
      com: r[0]||'', car: r[1]||'', name: r[2]||'', code: r[3]||''
    })).filter(x => x.name || x.code);
    
    document.getElementById("db-count").textContent = dbData.length + "개";
    renderTable(dbData);
  } catch(e) {
    tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:var(--danger); padding:30px;">❌ 연동 실패 (배포/공유 설정을 확인하세요)</td></tr>`;
  }
}

function renderTable(arr) {
  const tbody = document.getElementById("db-table-body");
  if(arr.length === 0) {
    tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:var(--text-muted); padding:30px;">검색 결과가 없습니다.</td></tr>`;
    return;
  }
  tbody.innerHTML = arr.map(x => `
    <tr>
      <td style="font-weight:600; color:#fff;">${escape(x.com)}</td>
      <td><span class="badge badge-car">${escape(x.car)}</span></td>
      <td style="font-size:12px; color:#94a3b8;">${escape(x.name)}</td>
      <td><span class="badge badge-code">${escape(x.code)}</span></td>
    </tr>
  `).join('');
}

function searchDB() {
  const q = document.getElementById("search-input").value.toLowerCase().trim();
  if(!q) return renderTable(dbData);
  const filtered = dbData.filter(x => 
    x.com.toLowerCase().includes(q) || x.car.toLowerCase().includes(q) || 
    x.name.toLowerCase().includes(q) || x.code.toLowerCase().includes(q)
  );
  renderTable(filtered);
}

// 2. 새로운 매핑 정보 구글 시트에 POST 저장
async function submitMapping(e) {
  e.preventDefault();
  const com = document.getElementById("form-com").value.trim();
  const car = document.getElementById("form-car").value.trim();
  const name = document.getElementById("form-name").value.trim();
  const code = document.getElementById("form-code").value.trim();
  
  showToast("⏳ 구글 시트에 기록 중...");
  
  try {
    const response = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify({ company: com, carType: car, partName: name, code: code })
    });
    const resText = await response.json();
    if(resText.result === "success") {
      showToast("✅ 시트 저장 성공!");
      document.getElementById("mapping-form").reset();
      loadDatabase();
    } else {
      showToast("❌ 저장 실패: " + resText.message);
    }
  } catch(err) {
    showToast("❌ 구글 서버 통신 장애");
  }
}

// 세로형 텍스트 한줄 배분 유틸리티
function doFastParse() {
  const fi = document.getElementById("fast-input");
  const val = fi.value.trim();
  if(!val) return;
  const parts = val.split(/\s+/);
  if(parts[0]) document.getElementById("form-com").value = parts[0];
  if(parts[1]) document.getElementById("form-car").value = parts[1];
  if(parts[2]) document.getElementById("form-name").value = parts[2];
  if(parts[3]) document.getElementById("form-code").value = parts[3];
  fi.value = "";
  showToast("⚡ 칸별 대입 완료!");
}

// 3. 메시지 분석 및 자동 치환 매핑 매커니즘
let lastProcessedText = "";

function processData() {
  const input = document.getElementById("paste-input").value;
  if(!input.trim()) return showToast("분석할 메시지를 입력해 주세요.");
  
  const lines = input.split("\n");
  const resList = document.getElementById("result-list");
  resList.innerHTML = "";
  
  let finalLines = [];
  
  lines.forEach(line => {
    const trimmed = line.trim();
    if(!trimmed) { finalLines.push(""); return; }
    
    // 스킵할 문장 기준 필터링
    if(trimmed.includes("신청입니다") || trimmed.includes("미불출") || trimmed.startsWith("-") || trimmed.startsWith("★")) {
      finalLines.push(line);
      resList.innerHTML += `<div class="result-item"><span class="origin-txt" style="color:var(--text-muted);">${escape(trimmed)}</span><span class="badge" style="background:#1e2230; color:var(--text-muted);">제외행</span></div>`;
      return;
    }
    
    // 키워드 검사 매칭
    let found = null;
    for(let item of dbData) {
      if(item.name && trimmed.toLowerCase().includes(item.name.toLowerCase())) {
        found = item; break;
      }
    }
    
    if(found) {
      const newLine = `${line} -> [${found.code}]`;
      finalLines.push(newLine);
      resList.innerHTML += `
        <div class="result-item matched">
          <span class="origin-txt" style="color:#fff;">${escape(trimmed)}</span>
          <span class="badge badge-success">▶ ${escape(found.code)} (${escape(found.com)})</span>
        </div>`;
    } else {
      const newLine = `${line} -> [미등록 자재]`;
      finalLines.push(newLine);
      resList.innerHTML += `
        <div class="result-item unmatched">
          <span class="origin-txt">${escape(trimmed)}</span>
          <span class="badge badge-danger">⚠️ 미등록 자재</span>
        </div>`;
    }
  });
  
  lastProcessedText = finalLines.join("\n");
  document.getElementById("result-box").classList.add("visible");
  showToast("📊 매핑 매칭 완료!");
}

function copyResultText() {
  if(!lastProcessedText) return;
  navigator.clipboard.writeText(lastProcessedText).then(() => {
    showToast("📋 전체 결과가 복사되었습니다!");
  }).catch(() => {
    const el = document.createElement('textarea'); el.value = lastProcessedText;
    document.body.appendChild(el); el.select();
    document.execCommand("copy"); document.body.removeChild(el);
    showToast("📋 전체 결과가 복사되었습니다!");
  });
}

function clearAll() {
  document.getElementById("paste-input").value = "";
  document.getElementById("result-box").classList.remove("visible");
}

function showInstallGuide() {
  const m = document.getElementById('install-modal');
  m.style.display = 'flex';
  m.addEventListener('click', e => { if(e.target === m) m.style.display = 'none'; });
}

function escape(str) {
  if(!str) return '';
  return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

// ── Service Worker 등록 ──
if('serviceWorker' in navigator){
  const swCode = `
    const CACHE = 'pdi-v1';
    self.addEventListener('install', e => {
      e.waitUntil(caches.open(CACHE).then(c => c.addAll(['./', self.location.href])));
      self.skipWaiting();
    });
    self.addEventListener('activate', e => {
      e.waitUntil(caches.keys().then(keys => Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));
      self.clients.claim();
    });
    self.addEventListener('fetch', e => {
      e.respondWith(caches.match(e.request).then(r => r || fetch(e.request)));
    });
  `;
  const blob = new Blob([swCode], {type: 'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>Object.shrink);
}
