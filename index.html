<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="자재지원">
<meta name="theme-color" content="#0f1117">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230f1117'/%3E%3Ctext y='.9em' font-size='80' x='10'%3E🏭%3C/text%3E%3C/svg%3E">
<link rel="manifest" href="data:application/json,%7B%22name%22%3A%22%EC%83%9D%EC%82%B0%EA%B4%80%EB%A6%AC2%EB%B6%80+%EC%9E%90%EC%9E%AC%EC%A7%80%EC%9B%90%22%2C%22short_name%22%3A%22%EC%9E%90%EC%9E%AC%EC%A7%80%EC%9B%90%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%230f1117%22%2C%22theme_color%22%3A%22%230f1117%22%2C%22start_url%22%3A%22.%22%7D">
<title>수출 PDI 자재 업체 조회</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3350;
    --accent: #4f8ef7;
    --accent2: #f7c94f;
    --text: #e8eaf0;
    --text-muted: #7a80a0;
    --success: #4fcf8e;
    --danger: #f74f6b;
    --radius: 10px;
    --font: 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    --mono: 'JetBrains Mono','D2Coding',monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; }

  header {
    position: sticky; top: 0; z-index: 50;
    background: var(--surface); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 24px; height: 52px; gap: 12px;
  }
  header h1 { font-size: 15px; font-weight: 700; }
  .tag {
    font-size: 10px; font-weight: 700; letter-spacing: 1px;
    color: var(--accent2); background: rgba(247,201,79,.1);
    border: 1px solid rgba(247,201,79,.25); padding: 2px 8px; border-radius: 20px;
  }

  .content { max-width: 780px; margin: 0 auto; padding: 28px 20px 100px; display: flex; flex-direction: column; gap: 0; }

  .sec-label {
    font-size: 11px; font-weight: 700; letter-spacing: .6px;
    color: var(--text-muted); margin-bottom: 8px;
    display: flex; align-items: center; gap: 8px;
  }
  .sec-label::after { content:''; flex:1; height:1px; background:var(--border); }

  /* Paste */
  .paste-wrap {
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: var(--radius); display: flex; flex-direction: column; margin-bottom: 10px;
  }
  .paste-wrap:focus-within { border-color: var(--accent); }
  .paste-area {
    background: transparent; border: none; outline: none;
    color: var(--text); font-family: var(--mono); font-size: 13px;
    padding: 14px 16px; resize: none; line-height: 1.8; min-height: 140px; width: 100%;
  }
  .paste-area::placeholder { color: var(--text-muted); }
  .paste-toolbar {
    display: flex; justify-content: flex-end; gap: 8px;
    padding: 8px 12px; border-top: 1px solid var(--border);
  }

  /* Result */
  .result-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); margin-bottom: 10px; display: none;
  }
  .result-box.visible { display: block; }
  .result-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px; border-bottom: 1px solid var(--border);
  }
  .result-bar .rlabel { font-size: 12px; font-weight: 700; color: var(--text-muted); }
  .result-content {
    padding: 14px 16px; font-family: var(--mono);
    font-size: 13px; line-height: 2.1; white-space: pre-wrap;
  }
  .vendor-label { color: var(--accent2); font-weight: 700; }
  .unknown-label { color: var(--danger); font-weight: 700; }

  /* Divider */
  .big-divider {
    display: flex; align-items: center; gap: 12px;
    margin: 36px 0 24px; color: var(--text-muted);
    font-size: 11px; font-weight: 700; letter-spacing: .5px;
  }
  .big-divider::before, .big-divider::after { content:''; flex:1; height:1px; background:var(--border); }

  /* Mgmt grid */
  .mgmt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .card-head { padding: 11px 14px; border-bottom: 1px solid var(--border); font-size: 12px; font-weight: 700; background: var(--surface2); display: flex; justify-content: space-between; align-items: center; }
  .card-body { padding: 12px 14px; display: flex; flex-direction: column; gap: 8px; }

  /* Table */
  .data-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .data-table th {
    text-align: left; padding: 7px 10px; font-size: 10px; font-weight: 700;
    color: var(--text-muted); border-bottom: 1px solid var(--border); white-space: nowrap;
  }
  .data-table td { padding: 8px 10px; border-bottom: 1px solid var(--border); font-family: var(--mono); vertical-align: middle; }
  .data-table tr:last-child td { border-bottom: none; }
  .data-table tr:hover td { background: var(--surface2); cursor: pointer; }
  .badge {
    display: inline-block; padding: 2px 7px; border-radius: 4px;
    font-size: 10px; font-weight: 700; background: rgba(79,142,247,.15);
    color: var(--accent); border: 1px solid rgba(79,142,247,.3);
  }
  .badge-car {
    background: rgba(247,201,79,.1); color: var(--accent2); border-color: rgba(247,201,79,.3);
  }

  /* Form */
  .field-label { font-size: 10px; color: var(--text-muted); font-weight: 600; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  input[type=text] {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); font-family: var(--mono);
    font-size: 12px; padding: 8px 10px; width: 100%; outline: none; transition: border-color .15s;
  }
  input[type=text]:focus { border-color: var(--accent); }
  .hint { font-size: 10px; color: var(--text-muted); line-height: 1.6; }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; justify-content: center;
    gap: 5px; padding: 7px 14px; border-radius: 6px;
    font-size: 12px; font-weight: 700; cursor: pointer; border: none;
    transition: opacity .15s, transform .1s; font-family: var(--font);
  }
  .btn:active { transform: scale(.97); }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { opacity: .9; }
  .btn-danger { background: rgba(247,79,107,.15); color: var(--danger); border: 1px solid rgba(247,79,107,.3); }
  .btn-ghost { background: var(--surface2); border: 1px solid var(--border); color: var(--text-muted); }
  .btn-sm { padding: 4px 9px; font-size: 11px; }
  .btn-full { width: 100%; }

  /* Toast */
  .toast {
    position: fixed; bottom: 20px; right: 20px;
    background: var(--success); color: #0f1117; font-weight: 700; font-size: 13px;
    padding: 9px 16px; border-radius: 8px;
    transform: translateY(60px); opacity: 0; transition: all .25s; z-index: 999; pointer-events: none;
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  /* Modal */
  .modal-bg {
    position: fixed; inset: 0; background: rgba(0,0,0,.7);
    display: flex; align-items: center; justify-content: center;
    z-index: 100; backdrop-filter: blur(4px);
  }
  .modal-bg.hidden { display: none; }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 22px; width: 380px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .modal h3 { font-size: 14px; font-weight: 700; }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  @media (max-width: 620px) {
    .mgmt-grid { grid-template-columns: 1fr; }
    .form-row { grid-template-columns: 1fr; }
    .content { padding: 16px 12px 60px; }
  }
</style>
</head>
<body>

<header>
  <span style="font-size:28px">🏭</span>
  <div style="display:flex;flex-direction:column;gap:1px">
    <h1>생산관리2부 자재지원 자동화 시스템</h1>
    <span style="font-size:10px;color:var(--text-muted);letter-spacing:.3px">made by 김재현</span>
  </div>
  <button onclick="showInstallGuide()" style="margin-left:auto;background:rgba(79,142,247,.15);border:1px solid rgba(79,142,247,.3);color:var(--accent);border-radius:6px;padding:5px 10px;font-size:10px;font-weight:700;cursor:pointer;font-family:var(--font);white-space:nowrap;">📲 앱으로 설치</button>
</header>

<div id="install-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:flex-end;justify-content:center;">
  <div style="background:#1a1d27;border-radius:20px 20px 0 0;padding:28px 24px 40px;width:100%;max-width:500px;border-top:1px solid #2e3350;">
    <div style="font-size:18px;font-weight:700;margin-bottom:6px;">📲 홈 화면에 추가하기</div>
    <div style="font-size:12px;color:#7a80a0;margin-bottom:20px;">앱처럼 바탕화면에서 바로 실행할 수 있어요</div>

    <div style="display:flex;flex-direction:column;gap:14px;">
      <div style="display:flex;align-items:flex-start;gap:12px;">
        <span style="font-size:22px;min-width:32px;">1️⃣</span>
        <div>
          <div style="font-size:13px;font-weight:700;margin-bottom:2px;">사파리 하단 공유 버튼 탭</div>
          <div style="font-size:11px;color:#7a80a0;">화면 하단 가운데 □↑ 버튼을 누르세요</div>
        </div>
      </div>
      <div style="display:flex;align-items:flex-start;gap:12px;">
        <span style="font-size:22px;min-width:32px;">2️⃣</span>
        <div>
          <div style="font-size:13px;font-weight:700;margin-bottom:2px;">"홈 화면에 추가" 선택</div>
          <div style="font-size:11px;color:#7a80a0;">스크롤해서 "홈 화면에 추가"를 탭하세요</div>
        </div>
      </div>
      <div style="display:flex;align-items:flex-start;gap:12px;">
        <span style="font-size:22px;min-width:32px;">3️⃣</span>
        <div>
          <div style="font-size:13px;font-weight:700;margin-bottom:2px;">추가 탭</div>
          <div style="font-size:11px;color:#7a80a0;">오른쪽 상단 "추가"를 누르면 완료!</div>
        </div>
      </div>
    </div>

    <button onclick="document.getElementById('install-modal').style.display='none'"
      style="margin-top:24px;width:100%;padding:13px;background:var(--accent);border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;">
      확인
    </button>
  </div>
</div>

<div class="content">

  <div class="sec-label">📥 단톡방 메시지 붙여넣기</div>
  <div class="paste-wrap">
    <textarea class="paste-area" id="paste-input" onpaste="setTimeout(processMessage,50)"
      placeholder="여기에 단톡방 메시지 전체를 붙여넣으세요…&#10;&#10;예)&#10;24일 수출PDI 자재 신청입니다&#10;-미불출 건&#10;JR 359644 CONSOLE UPR COVER-XG62&#10;JR 357199 CONSOLE UPR COVER-TY89&#10;0R 296225 O/H CONSOLE-T60"
    ></textarea>
    <div class="paste-toolbar">
      <button class="btn btn-ghost btn-sm" onclick="clearAll()">초기화</button>
      <button class="btn btn-ghost btn-sm" id="paste-btn" onclick="triggerPaste()">📋 붙여넣기</button>
      <button class="btn btn-primary" onclick="processMessage()">조회 ▶</button>
    </div>
  </div>

  <div id="result-box" class="result-box">
    <div class="result-bar">
      <span class="rlabel" id="result-label">📦 결과</span>
      <button class="btn btn-primary btn-sm" onclick="copyResult('export')">수출복사 ✈️</button>
      <button class="btn btn-primary btn-sm" onclick="copyResult('domestic')" style="background:var(--success);color:#0f1117;">내수복사 🚗</button>
    </div>
    <div class="result-content" id="result-content"></div>
  </div>

  <div class="big-divider">업체 · 자재 코드 관리</div>

  <div class="mgmt-grid">

    <div class="card">
      <div class="card-head">＋ 매핑 추가</div>
      <div class="card-body">

        <div
